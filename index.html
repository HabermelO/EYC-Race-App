<style>
  :root{
    --bg:#fff;--bg2:#f5f5f4;--bg3:#ebebea;--txt:#1a1a18;--txt2:#6b6b67;--txt3:#9a9a96;
    --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);
    --green-bg:#eaf3de;--green-txt:#3b6d11;--green-bd:rgba(59,109,17,.3);

    --blue-bg:#e6f1fb;--blue-txt:#185fa5;--blue-bd:rgba(24,95,165,.3);
    --amber-bg:#faeeda;--amber-txt:#854f0b;--amber-bd:rgba(133,79,11,.3);
    --teal-bg:#e1f5ee;--teal-txt:#0f6e56;--teal-bd:rgba(15,110,86,.3);
    --purple-bg:#EEEDFE;--purple-txt:#3C3489;--purple-bd:rgba(83,74,183,.3);
    --silver:#f5f5f4;--radius:8px;--radius-lg:12px;--mono:'Courier New',Courier,monospace;
  }

    --bg:#1e1e1c;--bg2:#2a2a27;--bg3:#333330;--txt:#e8e8e4;--txt2:#9a9a96;--txt3:#6b6b67;
    --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);
    --green-bg:#173404;--green-txt:#c0dd97;--green-bd:rgba(192,221,151,.3);
    --red-bg:#501313;--red-txt:#f09595;--red-bd:rgba(240,149,149,.3);
    --blue-bg:#042c53;--blue-txt:#85b7eb;--blue-bd:rgba(133,183,235,.3);
    --amber-bg:#412402;--amber-txt:#fac775;--amber-bd:rgba(250,199,117,.3);
    --teal-bg:#04342c;--teal-txt:#5dcaa5;--teal-bd:rgba(93,202,165,.3);
    --purple-bg:#26215C;--purple-txt:#AFA9EC;--purple-bd:rgba(175,169,236,.3);
    --silver:#2a2a27;
  }}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--txt);min-height:100vh;
    padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
  #app{max-width:920px;margin:0 auto;padding:1.25rem 1rem 5rem;}
  input,select{font-family:inherit;font-size:14px;padding:8px 10px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--txt);width:100%;outline:none;}
  input:focus,select:focus{box-shadow:0 0 0 2px var(--blue-bd);border-color:var(--blue-txt);}
  button{font-family:inherit;font-size:13px;padding:8px 16px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--txt);cursor:pointer;white-space:nowrap;}
  button:hover{background:var(--bg2);}button:active{opacity:.8;}button:disabled{opacity:.4;cursor:not-allowed;}
  .card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;}
  .main-tabs{display:flex;background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:4px;gap:4px;margin-bottom:1rem;}
  .main-tab{flex:1;border:none;border-radius:6px;background:none;padding:10px 4px;font-size:12px;font-weight:500;color:var(--txt2);cursor:pointer;transition:background .15s;}
  .main-tab.active{background:var(--blue-bg);color:var(--blue-txt);}
  .main-tab:hover:not(.active){background:var(--bg2);}
  .sub-tabs{display:flex;border-bottom:.5px solid var(--border);margin-bottom:1.25rem;overflow-x:auto;}
  .sub-tab{border:none;border-bottom:2.5px solid transparent;border-radius:0;background:none;padding:8px 14px;font-size:13px;color:var(--txt2);cursor:pointer;flex-shrink:0;}
  .sub-tab.active{font-weight:600;color:var(--txt);border-bottom-color:var(--txt);}
  .sub-tab:hover{background:var(--bg2);}
  .mono{font-family:var(--mono);}
  .lbl{font-size:11px;color:var(--txt2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
  .badge{font-size:11px;border-radius:99px;padding:2px 8px;display:inline-block;}
  .btn-green{background:var(--green-bg)!important;color:var(--green-txt)!important;border-color:var(--green-bd)!important;}
  .btn-red{background:var(--red-bg)!important;color:var(--red-txt)!important;border-color:var(--red-bd)!important;}
  .btn-blue{background:var(--blue-bg)!important;color:var(--blue-txt)!important;border-color:var(--blue-bd)!important;}
  .btn-amber{background:var(--amber-bg)!important;color:var(--amber-txt)!important;border-color:var(--amber-bd)!important;}
  .btn-teal{background:var(--teal-bg)!important;color:var(--teal-txt)!important;border-color:var(--teal-bd)!important;}
  .btn-purple{background:var(--purple-bg)!important;color:var(--purple-txt)!important;border-color:var(--purple-bd)!important;}
  .comp-row{display:flex;align-items:center;gap:6px;padding:10px 12px;border:.5px solid var(--border);border-radius:var(--radius);background:var(--bg);margin-bottom:6px;}
  .comp-row.finished{background:var(--green-bg);border-color:var(--green-bd);}
  .comp-row.leading{border-color:var(--amber-bd);border-width:1px;}
  .comp-row.ocs-row{background:var(--red-bg);border-color:var(--red-bd);}
  .comp-row.ret-row{background:var(--bg2);opacity:.65;}
  .comp-row.dnf-row{background:var(--amber-bg);border-color:var(--amber-bd);}
  table.res{width:100%;border-collapse:collapse;}
  table.res th{padding:8px 10px;text-align:left;font-weight:600;color:var(--txt2);font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:.5px solid var(--border);}
  table.res td{padding:9px 10px;border-bottom:.5px solid var(--border);font-size:13px;vertical-align:top;}
  table.res tr:last-child td{border-bottom:none;}
  table.res tr.gold td{background:var(--amber-bg);}
  table.res tr.silver td{background:var(--silver);}
  table.courses{width:100%;border-collapse:collapse;font-size:13px;}
  table.courses th{padding:8px 10px;text-align:left;font-weight:600;color:var(--txt2);font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:.5px solid var(--border);white-space:nowrap;}
  table.courses td{padding:8px 10px;border-bottom:.5px solid var(--border);vertical-align:top;}
  table.courses tr:last-child td{border-bottom:none;}
  table.courses tr:hover td{background:var(--bg2);}
  .cal-item{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border:.5px solid var(--border);border-radius:var(--radius);background:var(--bg);margin-bottom:5px;}
  .cal-item.today-race{border-color:var(--green-bd);background:var(--green-bg);}
  .cal-item.soon-race{border-color:var(--amber-bd);background:var(--amber-bg);}
  .cal-item.past-race{opacity:.6;}
  .month-hdr{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--txt2);margin:1.25rem 0 .5rem;padding:0 2px;}
  /* Starting sequence */
  .seq-box{background:var(--amber-bg);border:1px solid var(--amber-bd);padding:1rem;border-radius:var(--radius);margin-bottom:1rem;}
  .seq-phase{font-size:22px;font-weight:700;color:var(--txt);line-height:1.3;padding:12px 14px;background:var(--bg);border-radius:var(--radius);box-shadow:0 2px 6px rgba(0,0,0,.06);}
  .seq-phase.action{color:var(--green-txt);background:var(--green-bg);}
  .seq-phase.warning{color:var(--red-txt);background:var(--red-bg);}
  .seq-phase small{display:block;font-size:13px;font-weight:500;color:var(--txt2);margin-top:4px;}
  /* Status badge variants */
  .st-ocs{background:var(--red-bg);color:var(--red-txt);border:.5px solid var(--red-bd);}
  .st-dnf{background:var(--amber-bg);color:var(--amber-txt);border:.5px solid var(--amber-bd);}
  .st-ret{background:var(--bg2);color:var(--txt2);border:.5px solid var(--border2);}
  .st-ok{background:var(--green-bg);color:var(--green-txt);border:.5px solid var(--green-bd);}
  /* Shortened course banner */
  .sc-banner{background:var(--purple-bg);border:.5px solid var(--purple-bd);color:var(--purple-txt);border-radius:var(--radius);padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:10px;}
  #save-pill{position:fixed;bottom:calc(1rem + env(safe-area-inset-bottom));right:1rem;font-size:11px;padding:5px 12px;border-radius:99px;background:var(--green-bg);color:var(--green-txt);border:.5px solid var(--green-bd);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
  @media(max-width:600px){.grid3{grid-template-columns:1fr!important;}.timer-sz{font-size:44px!important;}.hide-xs{display:none!important;}}
</style>

// AUDIO (for starting sequence beeps)
// ─────────────────────────────────────────────────────────────────────────────
let audioCtx=null;
function initAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
}
function beep(freq,dur,vol=1){
  if(!audioCtx)return;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.type='sine';osc.frequency.value=freq;
  gain.gain.setValueAtTime(vol,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  osc.start();osc.stop(audioCtx.currentTime+dur);
}

function fmtTimer(ms){
  const neg=ms<0;
  ms=Math.abs(ms);
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60,t=Math.floor((ms%1000)/100);
  if(S.status==='sequence')return(neg?'-':'')+p(m%60)+':'+p(sc);
  return h>0?h+':'+p(m)+':'+p(sc)+'.'+t:p(m)+':'+p(sc)+'.'+t;
}
function p(n){return String(n).padStart(2,'0');}
function fmtSplit(ms){if(!ms&&ms!==0)return'—';const s=Math.floor(ms/1000),m=Math.floor(s/60),sc=s%60;return m+'m '+p(sc)+'s';}
function fmtRes(ms){if(ms===null||ms===undefined)return'—';const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?h+'h '+m+'m '+sc+'s':m+'m '+sc+'s';}
function posl(i){return['1st','2nd','3rd'][i]||(i+1)+'th';}

// STARTING SEQUENCE LOGIC
// ─────────────────────────────────────────────────────────────────────────────
// S.elapsed counts from negative (−5 min + buffer) up to 0 = gun
function seqPhase(ms){
  const sec=Math.ceil(ms/1000);
  if(sec<=-300)return{msg:'Warning signal — 5 minutes',sub:'Raise Class Flag',cls:'action'};
  if(sec<=-240)return{msg:'Preparatory signal — 4 minutes',sub:'Raise Preparatory Flag (P / I / Z)',cls:'action'};
  if(sec<=-60)return{msg:'One minute — lower Prep Flag',sub:Math.abs(sec)+' seconds to start',cls:'warning'};
  if(sec<0)return{msg:'Starting now in '+Math.abs(sec)+'s',sub:'Prepare to lower Class Flag',cls:'warning'};
  return{msg:'RACE STARTED',sub:'Lower Class Flag',cls:'action'};
}
let lastSeqSec=null;
function seqTick(){
  if(S.status!=='sequence'&&S.status!=='running')return;
  S.elapsed=Date.now()-S.startTime;
  const sec=Math.ceil(S.elapsed/1000);
  if(S.status==='sequence'){
    if(sec!==lastSeqSec){
      lastSeqSec=sec;
      if(sec===-300){beep(880,0.5);beep(660,0.5);}
      if(sec===-240){beep(880,0.5);beep(660,0.5);}
      if(sec===-60){beep(880,1.0);}
      if(sec>=-5&&sec<0){beep(660,0.15);}
      if(sec===0){beep(880,1.5);setTimeout(()=>{S.status='running';saveState();render();},500);}
      const inst=document.getElementById('seq-inst');
      if(inst){const ph=seqPhase(S.elapsed);inst.className='seq-phase '+ph.cls;inst.innerHTML=ph.msg+`<small>${ph.sub}</small>`;}
    }
  }
  const el=document.getElementById('tmr');
  if(el)el.textContent=fmtTimer(S.elapsed);
}

// ─────────────────────────────────────────────────────────────────────────────
// RACE LOGIC
// ─────────────────────────────────────────────────────────────────────────────
function sortedComps(){
  const any=S.comps.some(c=>c.laps>0||c.finishTime!==null);
  if(!any)return[...S.comps];
  return[...S.comps].sort((a,b)=>{
    // OCS/RET go to bottom
    const aEx=a.status==='ocs'||a.status==='ret';
    const bEx=b.status==='ocs'||b.status==='ret';
    if(aEx!==bEx)return aEx?1:-1;
    if(b.laps!==a.laps)return b.laps-a.laps;
    const aT=a.lapTimes.length?a.lapTimes[a.lapTimes.length-1]:Infinity;
    const bT=b.lapTimes.length?b.lapTimes[b.lapTimes.length-1]:Infinity;
    return aT-bT;
  });
}

// Average lap scoring for shortened course
function getResults(){
  const active=S.comps.filter(c=>c.status!=='ocs'&&c.status!=='ret');
  const maxLaps=Math.max(0,...active.map(c=>c.laps));
  return active.map(c=>{
    let eff,corr;
    const dnf=c.finishTime===null;
    if(S.shortenedCourse&&c.laps>0&&maxLaps>0){
      // Avg lap time × max laps (normalises boats on different lap counts)
      const rawTime=c.finishTime!==null?c.finishTime:(c.lapTimes.length?c.lapTimes[c.lapTimes.length-1]:null);
      if(rawTime!==null){
        const avgLap=rawTime/c.laps;
        eff=Math.round(avgLap*maxLaps);
      } else { eff=null; }
    } else {
      eff=c.finishTime!==null?c.finishTime:(c.lapTimes.length?c.lapTimes[c.lapTimes.length-1]:null);
    }
    corr=eff!==null?Math.round(eff*1000/c.py):null;
    return{...c,eff,corr,dnf};
  }).filter(c=>c.laps>0).sort((a,b)=>{
    if(b.laps!==a.laps&&!S.shortenedCourse)return b.laps-a.laps;
    if(a.corr===null)return 1;if(b.corr===null)return -1;return a.corr-b.corr;
  });
}

function lapSplits(c){
  return c.lapTimes.map((t,i)=>{
    const dur=i===0?t:t-c.lapTimes[i-1];
    const lbl=(i===c.lapTimes.length-1&&c.finishTime!==null)?'Finish':'Lap '+(i+1);
    return{lbl,dur};
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// UNDO / REDO SYSTEM
// ─────────────────────────────────────────────────────────────────────────────
function pushHistory(type,id){
  const c=S.comps.find(x=>x.id===id);
  if(!c)return;
  // Any new action clears the redo stack
  S.redoHistory=[];
  S.actionHistory.push({type,id,laps:c.laps,finishTime:c.finishTime,lapTimes:[...c.lapTimes],status:c.status});
  if(S.actionHistory.length>30)S.actionHistory.shift();
}
window.undoLast=()=>{
  if(!S.actionHistory.length)return;
  const h=S.actionHistory.pop();
  const c=S.comps.find(x=>x.id===h.id);
  if(!c)return;
  // Save current state to redo stack before reverting
  S.redoHistory.push({type:h.type,id:h.id,laps:c.laps,finishTime:c.finishTime,lapTimes:[...c.lapTimes],status:c.status});
  c.laps=h.laps;c.finishTime=h.finishTime;c.lapTimes=h.lapTimes;c.status=h.status;
  saveState();renderRaceList();
};
window.redoLast=()=>{
  if(!S.redoHistory.length)return;
  const h=S.redoHistory.pop();
  const c=S.comps.find(x=>x.id===h.id);
  if(!c)return;
  // Save current state back to undo stack
  S.actionHistory.push({type:h.type,id:h.id,laps:c.laps,finishTime:c.finishTime,lapTimes:[...c.lapTimes],status:c.status});
  c.laps=h.laps;c.finishTime=h.finishTime;c.lapTimes=h.lapTimes;c.status=h.status;
  saveState();renderRaceList();
};

// ─────────────────────────────────────────────────────────────────────────────
// CSV DOWNLOAD
// ─────────────────────────────────────────────────────────────────────────────
window.downloadCSV=()=>{
  const results=getResults();
  if(!results.length){alert('No results to export yet.');return;}
  const rows=[['Position','Sail Number','Boat Class','PY Number','Laps','Lap Times','Elapsed Time','Corrected Time','Status']];
  results.forEach((c,i)=>{
    const splits=lapSplits(c).map(s=>`${s.lbl}: ${fmtSplit(s.dur)}`).join(' | ');
    const status=c.dnf?'DNF':(c.status||'Finished');
    rows.push([posl(i),c.sail,c.name,c.py,c.laps,splits,fmtRes(c.eff),c.corr!==null?fmtRes(c.corr):'—',status]);
  });
  // Also list OCS/RET
  S.comps.filter(c=>c.status==='ocs'||c.status==='ret').forEach(c=>{
    rows.push(['—',c.sail,c.name,c.py,c.laps,'','','',c.status.toUpperCase()]);
  });
  const csv='data:text/csv;charset=utf-8,'+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=encodeURI(csv);
  a.download='EYC_Race_Results_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
};

window.addComp=()=>{
  const sail=S.sailInput.trim().toUpperCase();if(!sail)return;
  const cls=CLASSES[S.classIdx];
  const name=cls.name==='Custom / Other'?(S.customName||'Custom'):cls.name;
  S.comps.push({id:S.nextId++,sail,name,py:parseInt(S.pyInput)||1000,laps:0,finishTime:null,lapTimes:[],addedLate:false,status:'ok'});
  S.sailInput='';saveState();render();
};
window.removeComp=id=>{S.comps=S.comps.filter(c=>c.id!==id);saveState();render();};
window.toggleLateAdd=()=>{S.showLateAdd=!S.showLateAdd;saveState();render();};
window.addLateComp=()=>{
  const sail=S.lateSailInput.trim().toUpperCase();if(!sail)return;
  const cls=CLASSES[S.lateClassIdx];
  const name=cls.name==='Custom / Other'?(S.lateCustomName||'Custom'):cls.name;
  S.comps.push({id:S.nextId++,sail,name,py:parseInt(S.latePyInput)||1000,laps:0,finishTime:null,lapTimes:[],addedLate:true,status:'ok'});
  S.lateSailInput='';S.showLateAdd=false;saveState();renderRaceList();
};
window.onLateCC=v=>{S.lateClassIdx=parseInt(v);S.latePyInput=CLASSES[S.lateClassIdx].py;render();};
window.onLatePY=v=>S.latePyInput=v;
window.onLateSail=v=>S.lateSailInput=v;
window.onLateCN=v=>S.lateCustomName=v;
window.onLateSK=e=>{if(e.key==='Enter')addLateComp();};

window.setStatus=(id,st)=>{
  const c=S.comps.find(x=>x.id===id);
  if(!c)return;
  pushHistory('status',id);
  if(c.status===st){c.status='ok';}else{c.status=st;}
  // OCS/RET = exclude from results
  if(c.status==='ocs'){c.finishTime=null;c.laps=0;c.lapTimes=[];}
  saveState();renderRaceList();
};

window.startSequence=()=>{
  initAudio();
  S.status='sequence';
  S.startTime=Date.now()+305000; // race gun 5m05s ahead (gives a few seconds of lead-in)
  S.elapsed=-(S.startTime-Date.now());
  S.comps.forEach(c=>{c.laps=0;c.finishTime=null;c.lapTimes=[];c.status='ok';c.addedLate=false;});
  S.actionHistory=[];S.redoHistory=[];S.showLateAdd=false;
  clearInterval(S.timerRef);
  S.timerRef=setInterval(seqTick,100);
  saveState();render();
};
window.instantStart=()=>{
  S.status='running';S.startTime=Date.now();S.elapsed=0;S.showLateAdd=false;
  S.comps.forEach(c=>{c.laps=0;c.finishTime=null;c.lapTimes=[];c.status='ok';c.addedLate=false;});
  S.actionHistory=[];S.redoHistory=[];
  clearInterval(S.timerRef);
  S.timerRef=setInterval(seqTick,100);
  saveState();render();
};
window.endRace=()=>{S.status='finished';S.showLateAdd=false;clearInterval(S.timerRef);saveState();render();};
window.resetRace=()=>{
  if(!confirm('Reset race and clear all times?'))return;
  clearInterval(S.timerRef);
  S.status='idle';S.elapsed=0;S.startTime=null;S.showLateAdd=false;S.shortenedCourse=false;
  S.comps.forEach(c=>{c.laps=0;c.finishTime=null;c.lapTimes=[];c.status='ok';c.addedLate=false;});
  S.actionHistory=[];
  saveState();render();
};
window.recLap=id=>{
  if(S.status!=='running')return;
  const c=S.comps.find(x=>x.id===id);
  if(!c||c.status==='ocs'||c.status==='ret')return;
  pushHistory('lap',id);
  c.laps++;c.lapTimes.push(S.elapsed);
  saveState();renderRaceList();
};
window.recFinish=id=>{
  if(S.status!=='running')return;
  const c=S.comps.find(x=>x.id===id);
  if(!c||c.finishTime!==null||c.status==='ocs'||c.status==='ret')return;
  pushHistory('finish',id);
  c.finishTime=S.elapsed;c.laps++;c.lapTimes.push(S.elapsed);
  saveState();renderRaceList();
};
window.onCC=v=>{S.classIdx=parseInt(v);S.pyInput=CLASSES[S.classIdx].py;render();};
window.onPY=v=>S.pyInput=v;
window.onSail=v=>S.sailInput=v;
window.onCN=v=>S.customName=v;
window.onSK=e=>{if(e.key==='Enter')addComp();};

function renderRaceList(){
  const el=document.getElementById('race-list');if(!el)return;
  const running=S.status==='running';
  const any=S.comps.some(c=>c.laps>0||c.finishTime!==null);
  const sorted=sortedComps();
  const statusOpts=['ocs','dnf','ret'];
  el.innerHTML=(any?'<p style="font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">On-water order — re-sorts each lap</p>':'')+
  sorted.map((c,i)=>{
    const lead=any&&i===0&&c.laps>0&&c.finishTime===null&&c.status==='ok';
    const rowCls=c.status==='ocs'?'ocs-row':c.status==='ret'?'ret-row':c.status==='dnf'?'dnf-row':c.finishTime!==null?'finished':lead?'leading':'';
    return`<div class="comp-row ${rowCls}">
      ${any?`<span style="font-size:12px;font-weight:600;color:var(--txt2);min-width:20px;">${c.status==='ocs'||c.status==='ret'?'—':i+1}</span>`:''}
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <span class="mono" style="font-weight:700;font-size:15px;">${c.sail}</span>
          <span style="font-size:12px;color:var(--txt2);">${c.name}</span>
          ${c.status!=='ok'?`<span class="badge st-${c.status}" style="font-size:10px;">${c.status.toUpperCase()}</span>`:''}
          ${c.addedLate?`<span class="badge" style="background:var(--amber-bg);color:var(--amber-txt);font-size:10px;">Added</span>`:''}
        </div>
        <div style="font-size:11px;color:var(--txt2);margin-top:2px;">${c.laps} lap${c.laps!==1?'s':''}${c.finishTime!==null?' · FIN '+fmtTimer(c.finishTime):''}</div>
      </div>
      <!-- Status dropdown -->
      <select onchange="setStatus(${c.id},this.value);this.blur();" style="width:60px;font-size:11px;padding:4px 2px;flex-shrink:0;" title="Set status">
        <option value="ok" ${c.status==='ok'?'selected':''}>—</option>
        <option value="ocs" ${c.status==='ocs'?'selected':''}>OCS</option>
        <option value="dnf" ${c.status==='dnf'?'selected':''}>DNF</option>
        <option value="ret" ${c.status==='ret'?'selected':''}>RET</option>
      </select>
      ${c.status!=='ocs'&&c.status!=='ret'&&c.finishTime===null
        ?`<div style="display:flex;gap:4px;flex-shrink:0;">
            <button onclick="recLap(${c.id})" ${!running?'disabled':''} style="padding:8px 10px;">+Lap</button>
            <button class="btn-blue" onclick="recFinish(${c.id})" ${!running?'disabled':''} style="padding:8px 10px;">Fin</button>
          </div>`
        :c.finishTime!==null?`<span class="mono" style="font-size:12px;color:var(--green-txt);flex-shrink:0;">${fmtTimer(c.finishTime)} &#10003;</span>`
        :`<span style="font-size:11px;color:var(--txt3);flex-shrink:0;">${c.status.toUpperCase()}</span>`}
    </div>`;}).join('');
}

function monthName(d){return['January','February','March','April','May','June','July','August','September','October','November','December'][new Date(d+'T12:00:00').getMonth()];}

        <td class="mono" style="font-weight:700;">${c.sail}</td>
        <td style="color:var(--txt2);font-size:12px;">${c.name}</td>
        <td style="text-align:center;">${c.laps}${S.shortenedCourse&&c.laps<maxLaps?`<span style="font-size:10px;color:var(--purple-txt);"> (→${maxLaps})</span>`:''}</td>
        <td style="text-align:right;color:var(--txt2);">${c.py}</td>
        <td><div style="font-size:11px;color:var(--txt2);line-height:1.9;">${lapSplits(c).map(s=>`${s.lbl}: <span class="mono" style="color:var(--txt);">${fmtSplit(s.dur)}</span>`).join('<br>')}</div></td>
        <td class="mono" style="text-align:right;font-size:12px;">${fmtRes(c.eff)}</td>
        <td class="mono" style="text-align:right;font-weight:700;color:${i===0?'var(--amber-txt)':'var(--txt)'};">${c.corr!==null?fmtRes(c.corr):'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>
    <!-- OCS/RET list -->
    ${S.comps.some(c=>c.status==='ocs'||c.status==='ret')?`
    <div class="card" style="margin-bottom:1rem;">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--txt2);margin-bottom:8px;">Excluded from results</div>
      ${S.comps.filter(c=>c.status==='ocs'||c.status==='ret').map(c=>`
      <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid var(--border);">
        <span class="mono" style="font-weight:700;">${c.sail}</span>
        <span style="flex:1;font-size:13px;color:var(--txt2);">${c.name}</span>
        <span class="badge st-${c.status}">${c.status.toUpperCase()}</span>
      </div>`).join('')}
    </div>`:''}
    <div style="padding:10px 14px;background:var(--bg2);border-radius:var(--radius);font-size:12px;color:var(--txt2);">Corrected time = elapsed &times; 1000 &divide; PY &nbsp;&middot;&nbsp; Lower = better &nbsp;&middot;&nbsp; RYA PY 2026</div>`}
  `:''}

  <!-- FLAG GUIDE -->
  ${S.raceTab==='flags'?`
    <div style="margin-bottom:1rem;padding:10px 14px;background:var(--blue-bg);border:.5px solid var(--blue-bd);border-radius:var(--radius);font-size:13px;color:var(--blue-txt);">
      Standard RRS 26 starting procedure — 5 minute sequence. Use the <strong>5-Min Sequence</strong> button in the Timer tab to run this live with audio beeps and on-screen prompts.
    </div>
    ${[
      {t:'-5:00',flag:'Warning signal — Class Flag raised',action:'One sound signal',clr:'green'},
      {t:'-4:00',flag:'Preparatory signal — Prep Flag raised (P / I / Z)',action:'One sound signal',clr:'green'},
      {t:'-1:00',flag:'Preparatory Flag lowered',action:'One long sound signal',clr:'amber'},
      {t:'0:00',flag:'START — Class Flag lowered',action:'One sound signal',clr:'red'},
    ].map(row=>`<div style="display:flex;align-items:flex-start;gap:14px;padding:12px 14px;background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);margin-bottom:6px;">
      <div class="mono" style="font-size:20px;font-weight:700;min-width:56px;color:var(--${row.clr}-txt);">${row.t}</div>
      <div>
        <div style="font-weight:600;font-size:14px;">${row.flag}</div>
        <div style="font-size:12px;color:var(--txt2);margin-top:3px;">${row.action}</div>
      </div>
    </div>`).join('')}
    <div style="margin-top:1rem;padding:12px 14px;background:var(--amber-bg);border:.5px solid var(--amber-bd);border-radius:var(--radius);font-size:13px;color:var(--amber-txt);line-height:1.6;">
      <strong>OCS (On Course Side):</strong> If a boat is over the line at the gun, note their sail number and use the OCS dropdown in the Timer tab — this excludes them from results automatically.<br><br>
      <strong>General Recall (First Substitute):</strong> Raise First Substitute flag and give two sound signals. Lower it one minute before the new start, then re-run the sequence.<br><br>
      <strong>Shorten Course (S flag):</strong> Display S flag with two sound signals at a rounding mark. Use the <em>Fly S flag</em> toggle in the Results tab — this applies average-lap scoring so boats on different lap counts are compared fairly.
    </div>
  `:''}
  `:''}

  <!-- ═══════ CALENDAR SECTION ═══════ -->
  ${S.mainTab==='calendar'?`
  <div class="sub-tabs">
    <button class="sub-tab ${S.calFilter==='all'?'active':''}" onclick="setFilter('all')">All events</button>
    <button class="sub-tab ${S.calFilter==='upcoming'?'active':''}" onclick="setFilter('upcoming')">Upcoming</button>
    <button class="sub-tab ${S.calFilter==='eod'?'active':''}" onclick="setFilter('eod')">EOD Races</button>
    <button class="sub-tab ${S.calFilter==='evening'?'active':''}" onclick="setFilter('evening')">Evening Races</button>
  </div>
  ${Object.keys(months).length===0?`<p style="text-align:center;color:var(--txt2);padding:2rem;">No events to show</p>`:''}
  ${Object.keys(months).map(mon=>`
    <div class="month-hdr">${monthName(mon+'-01')} ${mon.slice(0,4)}</div>
    ${months[mon].map(r=>{
      const isToday=r.d===todayStr,isSoon=r.d>todayStr&&r.d<=in14,isPast=r.d<todayStr;
      const dt=new Date(r.d+'T12:00:00');
      return`<div class="cal-item ${isToday?'today-race':isSoon?'soon-race':isPast?'past-race':''}">
        <div style="text-align:center;background:var(--bg2);border-radius:var(--radius);padding:6px 10px;min-width:50px;flex-shrink:0;">
          <div style="font-size:10px;color:var(--txt2);text-transform:uppercase;">${dt.toLocaleDateString('en-GB',{weekday:'short'})}</div>
          <div style="font-size:22px;font-weight:700;line-height:1.1;">${dt.getDate()}</div>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:14px;margin-bottom:3px;">
            ${r.events.split('·').map(e=>`<span>${e.trim()}</span>`).join('<span style="color:var(--txt3);margin:0 4px;">·</span>')}
            ${isToday?`<span class="badge" style="background:var(--green-bg);color:var(--green-txt);margin-left:5px;">Today</span>`:''}
            ${isSoon?`<span class="badge" style="background:var(--amber-bg);color:var(--amber-txt);margin-left:5px;">Soon</span>`:''}
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:3px;align-items:center;">
            ${r.hw?`<span style="font-size:12px;color:var(--blue-txt);">&#9651; HW ${r.hw} (${r.ht}m)</span>`:''}
            ${r.starts?`<span style="font-size:12px;color:var(--txt2);">&#x23F0; ${r.starts}</span>`:''}
            ${r.loc?`<span style="font-size:12px;color:var(--txt3);">${r.loc}</span>`:''}
            ${r.tender?`<span class="badge" style="background:var(--bg2);color:var(--txt2);font-size:10px;">Tender</span>`:''}
          </div>
        </div>
      </div>`;}).join('')}
  `).join('')}
  <div style="margin-top:1rem;padding:10px 14px;background:var(--bg2);border-radius:var(--radius);font-size:12px;color:var(--txt2);">EYC Sailing Programme 2026 · HW times for Southend-on-Sea / Leigh-on-Sea · Where no separate EOD time is listed, EOD starts with the All-in fleet</div>
  `:''}

  <!-- ═══════ COURSES SECTION ═══════ -->
  ${S.mainTab==='courses'?`
  <div class="sub-tabs">
    <button class="sub-tab ${S.courseTab==='courses'?'active':''}" onclick="setCourseTab('courses')">Course Card</button>
    <button class="sub-tab ${S.courseTab==='chart'?'active':''}" onclick="setCourseTab('chart')">Chart</button>
    <button class="sub-tab ${S.courseTab==='marks'?'active':''}" onclick="setCourseTab('marks')">Marks Key</button>
  </div>

  ${S.courseTab==='courses'?`
    <div style="margin-bottom:10px;padding:10px 14px;background:var(--blue-bg);border:.5px solid var(--blue-bd);border-radius:var(--radius);font-size:13px;color:var(--blue-txt);">
      2024 LSC / EYC Inshore Courses &nbsp;&middot;&nbsp;
      <strong>E</strong> = Easterly &nbsp;
      <strong>W</strong> = Westerly &nbsp;
      <strong>S</strong> = Starboard rounding &nbsp;
      <strong>P</strong> = Port rounding
    </div>
    <div class="card" style="padding:0;overflow:hidden;overflow-x:auto;">
    <table class="courses">
      <thead><tr>
        <th style="width:36px;">#</th>
        <th>Mark sequence</th>
        <th style="width:40px;text-align:center;">Dir</th>
        <th style="width:44px;text-align:center;">Laps</th>
        <th style="width:56px;text-align:center;">Rounding</th>
      </tr></thead>
      <tbody>${COURSES.map((c,i)=>`<tr style="background:${i%2===0?'var(--bg)':'var(--bg2)'};">
        <td style="font-weight:700;font-size:15px;color:var(--blue-txt);text-align:center;">${c.n}</td>
        <td class="mono" style="font-size:12px;line-height:1.7;">${c.seq}</td>
        <td style="text-align:center;font-weight:600;">${c.dir}</td>
        <td style="text-align:center;">${c.laps}</td>
        <td style="text-align:center;"><span class="badge" style="background:var(--${c.rnd==='S'?'green':c.rnd==='P'?'red':'amber'}-bg);color:var(--${c.rnd==='S'?'green':c.rnd==='P'?'red':'amber'}-txt);">${c.rnd}</span></td>
      </tr>`).join('')}</tbody>
    </table></div>
    <div style="margin-top:10px;padding:10px 14px;background:var(--bg2);border-radius:var(--radius);font-size:12px;color:var(--txt2);">DM = Distance Mark — position set by race officer on the day. For courses 25–28 parenthetical marks e.g. R(P) indicate individual rounding direction.</div>
  `:''}

  ${S.courseTab==='chart'?`
    <div class="card" style="padding:0.5rem;text-align:center;">
      <div style="font-size:13px;font-weight:600;margin-bottom:0.5rem;color:var(--txt2);">Essex Yacht Club Course Card 2019</div>
      <img src="${CHART_SRC}" alt="EYC Course Chart showing mark positions" style="width:100%;max-width:800px;border-radius:var(--radius);border:.5px solid var(--border);">
      <div style="font-size:11px;color:var(--txt3);margin-top:0.5rem;">Splash proof only, not guaranteed waterproof &nbsp;&middot;&nbsp; Verify mark positions with club before racing</div>
    </div>
  `:''}

  ${S.courseTab==='marks'?`
    <div class="card" style="margin-bottom:1rem;">
      <div style="font-size:15px;font-weight:600;margin-bottom:1rem;">LSC / EYC Mark Abbreviations</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;">
        ${MARKS.map(m=>`<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg2);border-radius:var(--radius);">
          <span class="mono" style="font-size:13px;font-weight:700;background:var(--blue-bg);color:var(--blue-txt);border:.5px solid var(--blue-bd);border-radius:4px;padding:2px 8px;flex-shrink:0;">${m.abbr}</span>
          <div>
            <div style="font-weight:600;font-size:14px;">${m.name}</div>
            <div style="font-size:12px;color:var(--txt2);margin-top:2px;">${m.desc}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>
    <div style="padding:10px 14px;background:var(--bg2);border-radius:var(--radius);font-size:12px;color:var(--txt2);">
      S = Starboard rounding &nbsp;&middot;&nbsp; P = Port rounding &nbsp;&middot;&nbsp; DM position set on the day by race officer
    </div>
  `:''}

  `:''}
  `;


  if(S.mainTab==='race'&&S.raceTab==='race'){
    renderRaceList();
    if((S.status==='running'||S.status==='sequence')&&!S.timerRef){
      S.timerRef=setInterval(seqTick,100);
    }
  }
}

render();

// SERVICE WORKER REGISTRATION
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service Worker Registered'))
      .catch(err => console.log('Service Worker Failed', err));
  });
}
  
</script>
</body>
</html>
